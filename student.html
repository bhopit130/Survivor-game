<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ลงทะเบียนทีม - Survivor</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body style="display:flex; flex-direction: column; align-items:center; justify-content:center; min-height: 100vh;">
    <div class="container" style="max-width: 450px; width:90%; padding:25px; position: relative;">
        <h1 style="font-size:1.8rem; margin-top:0;">📝 ลงทะเบียนทีม</h1>
        
        <div id="loginSection">
            <div class="input-group">
                <label class="input-label">รหัสห้อง (PIN จากหน้าจอครู)</label>
                <input type="number" id="roomPin" class="student-input" placeholder="กรอกรหัส 4 หลัก" style="border-color: #00b894; font-weight: bold; text-align: center; font-size: 1.5rem; letter-spacing: 2px;">
            </div>
            <div class="input-group">
                <label class="input-label">ชื่อทีม</label>
                <input type="text" id="teamName" class="student-input" placeholder="เช่น ทีมสายฟ้า">
            </div>
            <div class="input-group">
                <label class="input-label">ระดับชั้น</label>
                <input type="text" id="classRoom" class="student-input" placeholder="เช่น ม.4/1">
            </div>
            <label class="input-label">สมาชิกในทีม</label>
            <div id="membersContainer"></div>
            <button onclick="addMemberInput()" class="btn-main btn-add" style="margin-bottom:20px;">+ เพิ่มสมาชิก</button>
            <button id="joinBtn" class="btn-main btn-primary">บันทึกและเริ่มเกม 🚀</button>
        </div>

        <div id="bellSection" style="display: none; text-align:center;">
            <div style="background:#f1f2f6; padding:10px; border-radius:10px; margin-bottom:10px;">
                <h2 id="welcomeText" style="color:var(--primary); margin:0;"></h2>
                <p id="classText" style="color:#555; margin:5px 0 0 0;"></p>
                <p id="roomDisplay" style="font-weight: bold; color: #00b894; margin: 5px 0 0 0; font-size: 1rem; border-top: 1px solid #ccc; padding-top: 5px;"></p>
            </div>
            <p id="statusText" style="font-size:1.2rem; color:#888;">รอสัญญาณจากครู...</p>
            <button id="bellBtn" class="btn-bell">
                <span>⚡</span><br><span>กด!</span>
            </button>
            <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                <button onclick="document.getElementById('instructionModal').style.display='flex'" style="background:none; border:none; color:#0984e3; font-weight:bold; cursor:pointer; font-size:1rem;">❓ ดูกติกาการเล่น</button>
                <button id="logoutBtn" style="background:none; border:none; color:#ff7675; text-decoration:underline; cursor:pointer; font-size:0.9rem;">🚪 ออกจากห้อง / เปลี่ยนทีม</button>
            </div>
        </div>
    </div>

    <div id="instructionModal" class="modal-overlay">
        <div style="background: white; width: 85%; max-width: 400px; padding: 25px; border-radius: 15px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <h3 style="color: #6c5ce7; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; text-align:center;">🏝️ กติกา Survivor</h3>
            <ol style="line-height: 1.6; font-size: 1rem; color: #333; padding-left: 20px;">
                <li>ฟังโจทย์จากครูและช่วยกันคิด</li>
                <li>รอหน้าจอนับถอยหลัง <span style="color:#ff7675; font-weight:bold;">3.. 2.. 1..</span></li>
                <li>เมื่อปุ่มเปลี่ยนเป็นคำว่า <span style="color:#00b894; font-weight:bold;">"GO!"</span> ให้รีบกด</li>
                <li>ทีมที่กดไวสุด จะได้สิทธิ์ตอบ</li>
                <li>ตอบถูก <span style="color:#00b894; font-weight:bold;">+1</span> ตอบผิด <span style="color:#d63031; font-weight:bold;">-1</span></li>
            </ol>
            <div style="text-align: center; margin-top: 20px;">
                <button onclick="document.getElementById('instructionModal').style.display='none'" class="btn-main" style="background:#d63031; width: 100px;">ปิด</button>
            </div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px; color: rgba(255,255,255,0.8); font-size: 0.85rem; font-weight: 300;">
        ผู้สร้าง: นายบพิธ มังคะลา ครู โรงเรียนดีบุกพังงาวิทยายน
    </div>

    <script src="script_student.js"></script>
</body>
</html>
